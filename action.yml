name: 'exposure-check'
description: 'Find what attackers can see before they do — GitHub org/repo exposure scanner.'
author: 'GNSAC'
branding:
  icon: 'shield'
  color: 'orange'
inputs:
  repo:
    description: 'owner/repo to scan (defaults to the current repository)'
    required: false
    default: ${{ github.repository }}
  org:
    description: 'organisation or user to scan (public repos)'
    required: false
  format:
    description: 'text | json | markdown | html'
    required: false
    default: 'text'
  fail-on:
    description: 'none | low | medium | high | critical'
    required: false
    default: 'high'
  output:
    description: 'write the report to a file'
    required: false
  token:
    description: 'GitHub token'
    required: false
    default: ${{ github.token }}
  verbose:
    description: 'show detailed progress'
    required: false
    default: 'false'
  quiet:
    description: 'suppress progress output'
    required: false
    default: 'false'
runs:
  using: 'docker'
  image: 'Dockerfile'
  entrypoint: '/entrypoint.sh'
  env:
    INPUT_REPO: ${{ inputs.repo }}
    INPUT_ORG: ${{ inputs.org }}
    INPUT_FORMAT: ${{ inputs.format }}
    INPUT_FAIL_ON: ${{ inputs.fail-on }}
    INPUT_OUTPUT: ${{ inputs.output }}
    INPUT_TOKEN: ${{ inputs.token }}
    INPUT_VERBOSE: ${{ inputs.verbose }}
    INPUT_QUIET: ${{ inputs.quiet }}
