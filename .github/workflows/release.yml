name: release
on:
  push:
    tags: [ 'v*' ]
permissions:
  contents: write
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: '1.22' }
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out=exposure-check_${{ matrix.goos }}_${{ matrix.goarch }}
          [ "${{ matrix.goos }}" = "windows" ] && out=$out.exe
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "$out" .
          echo "ASSET=$out" >> $GITHUB_ENV
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ${{ env.ASSET }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MAJOR_MINOR="${TAG%.*}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/bariskececi/exposure-check:latest
            ghcr.io/bariskececi/exposure-check:v${{ steps.meta.outputs.version }}
            ghcr.io/bariskececi/exposure-check:v${{ steps.meta.outputs.major_minor }}
          labels: |
            org.opencontainers.image.title=exposure-check
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/bariskececi/exposure-check
            org.opencontainers.image.licenses=MIT
