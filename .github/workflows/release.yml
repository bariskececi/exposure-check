name: release
on:
  push:
    tags: [ 'v*' ]
permissions:
  contents: write
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out=exposure-check_${{ matrix.goos }}_${{ matrix.goarch }}
          [ "${{ matrix.goos }}" = "windows" ] && out=$out.exe
          CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "$out" .
          echo "ASSET=$out" >> $GITHUB_ENV
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MAJOR_MINOR="${TAG%.*}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/bariskececi/exposure-check:latest
            ghcr.io/bariskececi/exposure-check:v${{ steps.meta.outputs.version }}
            ghcr.io/bariskececi/exposure-check:v${{ steps.meta.outputs.major_minor }}
          labels: |
            org.opencontainers.image.title=exposure-check
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=https://github.com/bariskececi/exposure-check
            org.opencontainers.image.licenses=MIT
