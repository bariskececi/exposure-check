<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>exposure-check</title>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1113;--panel:#12181a;--card:#161d1f;--hair:#26302f;--ink:#ddd6c6;--dim:#8b877a;--faint:#565b55;--sodium:#f2a24a;--red:#e0512f;--orange:#ef8f4a;--yellow:#e6b455;--cyan:#8ba4a8;--green:#6fae5a;--mono:'IBM Plex Mono',monospace;--disp:'Saira Condensed',sans-serif;--sans:'IBM Plex Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;
background-image:linear-gradient(rgba(139,164,168,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(139,164,168,.03) 1px,transparent 1px);background-size:32px 32px}

/* header */
.header{padding:30px 0 20px;text-align:center;border-bottom:1px solid var(--hair)}
.header .logo{font-family:var(--disp);font-weight:700;font-size:42px;letter-spacing:-1px;color:#fff}
.header .logo span{color:var(--sodium)}
.header .tagline{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:4px}

/* scan form */
.scan-form{max-width:800px;margin:30px auto;padding:0 24px}
.input-row{display:flex;gap:10px;margin-bottom:12px}
.input-row input,.input-row select{font-family:var(--mono);font-size:13px;padding:12px 16px;background:var(--panel);border:1px solid var(--hair);color:var(--ink);outline:none;transition:border .2s}
.input-row input:focus{border-color:var(--sodium)}
.input-row input{flex:1}
.input-row select{min-width:140px;cursor:pointer;-webkit-appearance:none;appearance:none}
.scan-btn{font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:1px;text-transform:uppercase;padding:12px 32px;background:var(--sodium);color:var(--bg);border:none;cursor:pointer;transition:all .2s}
.scan-btn:hover{background:#ffb95e;transform:translateY(-1px)}
.scan-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.scan-btn .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--bg);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* status */
.status{max-width:800px;margin:0 auto;padding:0 24px}
.status-line{font-family:var(--mono);font-size:12px;color:var(--dim);padding:3px 0}
.status-line.active{color:var(--sodium)}

/* results */
.results{max-width:900px;margin:30px auto;padding:0 24px;display:none}
.score-bar{display:flex;align-items:center;gap:26px;padding:24px;background:var(--panel);border:1px solid var(--hair);margin-bottom:20px}
.score-num{font-family:var(--disp);font-weight:700;font-size:80px;line-height:.85}
.score-label{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-top:4px}
.tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--hair);border:1px solid var(--hair);flex:1}
.tile{background:var(--panel);padding:14px 16px}
.tile-val{font-family:var(--disp);font-weight:700;font-size:28px;line-height:1}
.tile-label{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-top:4px}

.section-title{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin:28px 0 12px;border-bottom:1px solid var(--hair);padding-bottom:8px}

/* findings */
.finding{background:var(--card);border:1px solid var(--hair);border-left:3px solid var(--hair);padding:16px 18px;margin-bottom:10px;transition:border-color .2s}
.finding:hover{border-left-color:var(--sodium)}
.finding-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sev-badge{font-family:var(--disp);font-weight:700;font-size:11px;letter-spacing:1px;border:1px solid;padding:2px 10px;white-space:nowrap}
.sev-CRITICAL{color:var(--red);border-color:var(--red)}
.sev-HIGH{color:var(--orange);border-color:var(--orange)}
.sev-MEDIUM{color:var(--yellow);border-color:var(--yellow)}
.sev-LOW{color:var(--cyan);border-color:var(--cyan)}
.sev-INFO{color:var(--faint);border-color:var(--faint)}
.finding-title{font-family:var(--disp);font-weight:600;font-size:18px;color:#fff}
.finding-cat{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin-left:auto}
.finding-loc{font-family:var(--mono);font-size:11px;color:var(--sodium);margin-top:8px;word-break:break-all}
.finding-detail{font-size:13px;color:var(--dim);line-height:1.55;margin-top:6px}
.finding-fix{font-family:var(--mono);font-size:11.5px;color:var(--ink);line-height:1.55;margin-top:8px}

/* emails */
.email-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.email-tag{font-family:var(--mono);font-size:12px;color:var(--ink);background:var(--panel);border:1px solid var(--hair);padding:5px 12px}

/* export buttons */
.export-bar{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.export-btn{font-family:var(--mono);font-size:11px;letter-spacing:1px;padding:8px 18px;background:var(--panel);border:1px solid var(--hair);color:var(--ink);cursor:pointer;transition:all .2s;text-transform:uppercase}
.export-btn:hover{border-color:var(--sodium);color:var(--sodium)}

.empty-state{text-align:center;padding:60px 20px;color:var(--faint)}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.empty-state p{font-family:var(--mono);font-size:13px;max-width:400px;margin:0 auto;line-height:1.6}

footer{text-align:center;padding:30px;font-family:var(--mono);font-size:11px;color:var(--faint);border-top:1px solid var(--hair);margin-top:40px}
footer a{color:var(--sodium);text-decoration:none}

@media(max-width:700px){.score-bar{flex-direction:column;align-items:flex-start}.tiles{width:100%;grid-template-columns:repeat(3,1fr)}.input-row{flex-direction:column}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">exposure<span>-check</span></div>
  <div class="tagline">find what attackers can see before they do</div>
</div>

<div class="scan-form">
  <div class="input-row">
    <select id="scanType">
      <option value="domain">Domain</option>
      <option value="github-org">GitHub Org</option>
      <option value="repo">GitHub Repo</option>
      <option value="full">Domain + Org</option>
    </select>
    <input type="text" id="target" placeholder="example.com" autofocus>
    <input type="text" id="target2" placeholder="GitHub org (for combined scan)" style="display:none">
    <button class="scan-btn" id="scanBtn" onclick="startScan()">SCAN</button>
  </div>
</div>

<div class="status" id="statusArea"></div>

<div class="results" id="results">
  <!-- filled by JS -->
</div>

<div class="results empty-state" id="emptyState">
  <div class="icon">&#x1f50d;</div>
  <p>Enter a domain, GitHub organisation, or repository above and hit SCAN to discover your exposure.</p>
</div>

<footer>
  <a href="https://github.com/bariskececi/exposure-check">exposure-check</a> &mdash; open-source exposure scanner. Scan assets you own or are authorised to assess.
</footer>

<script>
const $ = s => document.querySelector(s);
const scanType = $('#scanType');
const target = $('#target');
const target2 = $('#target2');
const scanBtn = $('#scanBtn');
const statusArea = $('#statusArea');
const resultsDiv = $('#results');
const emptyState = $('#emptyState');

const sevColors = {CRITICAL:'#e0512f',HIGH:'#ef8f4a',MEDIUM:'#e6b455',LOW:'#8ba4a8',INFO:'#565b55'};

scanType.addEventListener('change', () => {
  const v = scanType.value;
  target.placeholder = v === 'repo' ? 'owner/repo' : v === 'github-org' ? 'organisation' : 'example.com';
  target2.style.display = v === 'full' ? '' : 'none';
  if (v === 'full') target2.placeholder = 'GitHub org name';
});

function addStatus(msg, active) {
  const d = document.createElement('div');
  d.className = 'status-line' + (active ? ' active' : '');
  d.textContent = '> ' + msg;
  statusArea.appendChild(d);
  statusArea.scrollTop = statusArea.scrollHeight;
}

async function startScan() {
  const type = scanType.value;
  const val = target.value.trim();
  if (!val) return;

  scanBtn.disabled = true;
  scanBtn.innerHTML = '<span class="spinner"></span>SCANNING...';
  statusArea.innerHTML = '';
  resultsDiv.style.display = 'none';
  emptyState.style.display = 'none';

  const body = {type, target: val};
  if (type === 'full') body.target2 = target2.value.trim();

  addStatus('starting scan for ' + val + ' ...', true);

  try {
    const resp = await fetch('/api/scan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const data = await resp.json();

    if (data.error) {
      addStatus('ERROR: ' + data.error, false);
      return;
    }

    addStatus('scan complete — ' + data.findings.length + ' findings', false);
    renderResults(data);
  } catch (e) {
    addStatus('ERROR: ' + e.message, false);
  } finally {
    scanBtn.disabled = false;
    scanBtn.innerHTML = 'SCAN';
  }
}

function renderResults(data) {
  const f = data.findings || [];
  const emails = data.exposed_emails || [];
  const counts = data.counts || {};
  const score = data.posture_score;
  const scoreColor = score >= 80 ? '#6fae5a' : score >= 50 ? '#f2a24a' : '#e0512f';

  let html = `
  <div class="score-bar">
    <div>
      <div class="score-num" style="color:${scoreColor}">${score}</div>
      <div class="score-label">posture score / 100</div>
    </div>
    <div class="tiles">
      <div class="tile"><div class="tile-val" style="color:${sevColors.CRITICAL}">${counts.CRITICAL||0}</div><div class="tile-label">Critical</div></div>
      <div class="tile"><div class="tile-val" style="color:${sevColors.HIGH}">${counts.HIGH||0}</div><div class="tile-label">High</div></div>
      <div class="tile"><div class="tile-val" style="color:${sevColors.MEDIUM}">${counts.MEDIUM||0}</div><div class="tile-label">Medium</div></div>
      <div class="tile"><div class="tile-val" style="color:${sevColors.LOW}">${counts.LOW||0}</div><div class="tile-label">Low</div></div>
      <div class="tile"><div class="tile-val" style="color:${sevColors.INFO}">${emails.length}</div><div class="tile-label">Emails</div></div>
    </div>
  </div>
  <div class="section-title">Findings (${f.length})</div>`;

  if (f.length === 0) {
    html += '<div class="finding"><div class="finding-title" style="color:var(--green)">No exposure findings. Nicely locked down.</div></div>';
  }

  // group by category
  const cats = {};
  f.forEach(fi => { (cats[fi.category] = cats[fi.category] || []).push(fi); });
  const catOrder = ['secret','actions','domain','hygiene'];
  const catNames = {secret:'Leaked Secrets',actions:'GitHub Actions Risks',domain:'Domain Exposure',hygiene:'Security Hygiene'};

  catOrder.forEach(cat => {
    if (!cats[cat]) return;
    html += `<div class="section-title">${catNames[cat] || cat} (${cats[cat].length})</div>`;
    cats[cat].forEach(fi => {
      html += `<div class="finding">
        <div class="finding-header">
          <span class="sev-badge sev-${fi.severity}">${fi.severity}</span>
          <span class="finding-title">${esc(fi.title)}</span>
          <span class="finding-cat">${esc(fi.category)}</span>
        </div>
        ${fi.location ? `<div class="finding-loc">${esc(fi.location)}</div>` : ''}
        ${fi.detail ? `<div class="finding-detail">${esc(fi.detail)}</div>` : ''}
        ${fi.remediation ? `<div class="finding-fix">&#x25b8; ${esc(fi.remediation)}</div>` : ''}
      </div>`;
    });
  });

  if (emails.length > 0) {
    html += '<div class="section-title">Exposed Corporate Emails (' + emails.length + ')</div><div class="email-list">';
    emails.forEach(e => { html += `<span class="email-tag">${esc(e)}</span>`; });
    html += '</div>';
  }

  html += `<div class="export-bar">
    <button class="export-btn" onclick="exportReport('html')">Export HTML</button>
    <button class="export-btn" onclick="exportReport('json')">Export JSON</button>
    <button class="export-btn" onclick="exportReport('sarif')">Export SARIF</button>
    <button class="export-btn" onclick="exportReport('markdown')">Export Markdown</button>
  </div>`;

  resultsDiv.innerHTML = html;
  resultsDiv.style.display = 'block';
  window._lastReport = data;
}

async function exportReport(format) {
  if (!window._lastReport) return;
  try {
    const resp = await fetch('/api/export', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({report: window._lastReport, format})
    });
    const blob = await resp.blob();
    const ext = format === 'markdown' ? 'md' : format;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `exposure-report.${ext}`; a.click();
    URL.revokeObjectURL(url);
  } catch(e) { alert('Export failed: ' + e.message); }
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

target.addEventListener('keydown', e => { if (e.key === 'Enter') startScan(); });
</script>
</body>
</html>
